services:

  room-db:
    image: mysql:8.4
    container_name: room-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: room_db
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  billing-db:
    image: mysql:8.4
    container_name: billing-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: billing_db
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  room-service:
    build:
      context: .
      dockerfile: room-service/Dockerfile
    container_name: room-service
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      room-db:
        condition: service_healthy
    environment:
      MICRONAUT_ENVIRONMENTS: docker
      DB_HOST: room-db
      DB_PORT: 3306
      DB_NAME: room_db
      DB_USER: root
      DB_PASSWORD: root
      GRPC_SERVER_PORT: 9090

  billing-service:
    build:
      context: .
      dockerfile: billing-service/Dockerfile
    container_name: billing-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      billing-db:
        condition: service_healthy
      room-service:
        condition: service_started
    environment:
      MICRONAUT_ENVIRONMENTS: docker
      DB_HOST: billing-db
      DB_PORT: 3306
      DB_NAME: billing_db
      DB_USER: root
      DB_PASSWORD: root
      ROOM_GRPC_HOST: room-service
      ROOM_GRPC_PORT: 9090

  final-microservices:
    build:
      context: .
      dockerfile: csharp-services/FinalMicroservices/Dockerfile
    container_name: final-microservices
    restart: unless-stopped
    ports:
      - "5090:5090"
    depends_on:
      room-service:
        condition: service_started
      billing-service:
        condition: service_started
    environment:
      JavaServices__RoomBaseUrl: http://room-service:8080
      JavaServices__BillingBaseUrl: http://billing-service:8082
